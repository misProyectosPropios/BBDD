name: Build Typst document
on: [push, pull_request]

jobs:
  build_typst_documents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Typst
        uses: lvignoli/typst-action@main
        with:
          source_file: main.typ
      - name: List files
        run: ls -R
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: typst-output
          path: main.pdf
